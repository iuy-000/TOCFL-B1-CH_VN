{% extends "base.html" %}{% block content %}
<div class="single"><div class="card authCard">
  <h1>學生進入班級<br><span>Học viên vào lớp</span></h1>
  <form method="post" class="form">
    <label>班級密碼｜Mật khẩu lớp<input name="class_password" placeholder="輸入老師提供的班級密碼 / Nhập mật khẩu lớp"></label>
    <label>學號｜Mã số học viên<input name="student_id" placeholder="例如 S001 / Ví dụ S001"></label>
    <label>姓名（第一次必填）｜Họ tên (bắt buộc lần đầu)<input name="student_name" placeholder="王小明 / Nguyễn Văn A"></label>
    <button class="btn" type="submit">進入班級<br><span>Vào lớp</span></button>
  </form>
  <p class="small">第一次輸入班級密碼＋學號＋姓名。之後只要班級密碼＋學號即可。<br>Lần đầu cần nhập mật khẩu lớp + mã số + họ tên. Những lần sau chỉ cần mật khẩu lớp + mã số học viên.</p>
</div></div>
{% endblock %}
